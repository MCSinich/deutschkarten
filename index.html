<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deutsch Karten — A1</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1 class="title">Deutsch Karten</h1>
    <p class="subtitle">Уровень A1 · Составь 1–2 предложения со словом</p>

    <div class="card" id="card">
      <div class="card-placeholder" id="placeholder">
        Нажми «Следующее слово», чтобы начать
      </div>
      <div class="card-content hidden" id="content">
        <div class="word" id="word"></div>
        <div class="hint hidden" id="hint">
          <div class="hint-block">
            <div class="hint-label">Перевод</div>
            <div class="hint-text" id="translation"></div>
          </div>
          <div class="hint-block">
            <div class="hint-label">Когда применяется</div>
            <div class="hint-text" id="usage"></div>
          </div>
          <div class="hint-block">
            <div class="hint-label">Примеры</div>
            <ul class="examples" id="examples"></ul>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-secondary" id="hintBtn" disabled>Подсказка</button>
      <button class="btn btn-primary" id="nextBtn">Следующее слово</button>
    </div>
  </main>

  <script src="words.js"></script>
  <script src="app.js"></script>
</body>
</html>
